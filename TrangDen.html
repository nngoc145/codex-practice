  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; }

    /* === APP SHELL: Giao diện thật render bằng HTML === */
    #app-shell { min-height: 100vh; filter: blur(0); }

    /* AppBar */
    .shell-appbar { background: #667eea; color: #fff; height: 56px; display: flex; align-items: center; padding: 0 16px; box-shadow: 0 2px 4px rgba(0,0,0,.15); position: sticky; top: 0; z-index: 10; }
    .shell-appbar h1 { font-size: 20px; font-weight: 600; flex: 1; }

    /* Content */
    .shell-content { padding: 20px 16px; max-width: 800px; margin: 0 auto; }
    .shell-welcome { background: #fff; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .shell-welcome .avatar { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #667eea33, #764ba233); display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
    .shell-welcome .avatar svg { width: 28px; height: 28px; fill: #667eea; }
    .shell-welcome h2 { font-size: 22px; color: #333; margin-bottom: 4px; }
    .shell-welcome p { color: #888; font-size: 14px; }
    .shell-section-title { font-size: 16px; font-weight: 600; color: #333; margin: 24px 0 12px; display: flex; align-items: center; gap: 8px; }
    .shell-section-title svg { width: 20px; height: 20px; fill: #667eea; }
    .shell-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .shell-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .shell-card .thumb { height: 120px; background: linear-gradient(135deg, #667eea22, #764ba222); position: relative; }
    .shell-card .thumb .skeleton { position: absolute; inset: 0; background: linear-gradient(90deg, transparent 25%, rgba(102,126,234,.08) 50%, transparent 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    .shell-card .info { padding: 12px; }
    .shell-card .info .skel-line { height: 14px; border-radius: 7px; background: #eee; margin-bottom: 8px; }
    .shell-card .info .skel-line:last-child { width: 60%; margin-bottom: 0; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .shell-bottomnav { position: fixed; bottom: 0; left: 0; right: 0; height: 64px; background: #fff; border-top: 1px solid #eee; display: flex; align-items: center; justify-content: space-around; z-index: 10; }
    .shell-bottomnav .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; color: #999; font-size: 11px; }
    .shell-bottomnav .nav-item.active { color: #667eea; }
    .shell-bottomnav .nav-item svg { width: 24px; height: 24px; }

    /* Login shell */
    .shell-login { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0a0a1a url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=1200&q=80') center/cover no-repeat; padding: 32px; position: relative; }
    .shell-login::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.55); }
    .shell-login .card { background: #fff; border-radius: 20px; padding: 32px 24px; width: 100%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,.15); position: relative; z-index: 1; }
    .shell-login .header { text-align: center; margin-bottom: 32px; color: #fff; position: relative; z-index: 1; }
    .shell-login .header .logo { width: 80px; height: 80px; background: #fff; border-radius: 20px; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(0,0,0,.4); }
    .shell-login .header .logo svg { width: 44px; height: 44px; fill: #1a1a2e; }
    .shell-login .header h1 { font-size: 28px; margin: 0 0 4px; }
    .shell-login .header p { opacity: .8; font-size: 15px; margin: 0; }
    .shell-login input { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 12px; font-size: 15px; margin-bottom: 12px; outline: none; }
    .shell-login .btn-primary { width: 100%; padding: 14px; background: #1a1a2e; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; }
    .shell-login .divider { display: flex; align-items: center; gap: 16px; margin: 20px 0; color: #aaa; font-size: 13px; }
    .shell-login .divider::before, .shell-login .divider::after { content: ''; flex: 1; height: 1px; background: #ddd; }
    .shell-login .btn-google { width: 100%; padding: 12px; background: #fff; border: 1px solid #ddd; border-radius: 12px; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }

    /* === LỚP PHỦ LOADING === */
    #loading-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(2px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #fff;
      transition: opacity .4s ease;
    }
    #loading-overlay.fade-out { opacity: 0; pointer-events: none; }
    #loading-overlay .loader-icon {
      width: 64px; height: 64px; background: #fff; border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,.3);
      margin-bottom: 20px;
    }
    #loading-overlay .loader-icon svg { width: 36px; height: 36px; fill: #1a1a2e; }
    #loading-overlay .loader-text { font-size: 16px; font-weight: 500; margin-bottom: 20px; letter-spacing: .3px; }
    #loading-overlay .progress-wrap {
      width: 220px; height: 6px; background: rgba(255,255,255,.2); border-radius: 3px; overflow: hidden;
    }
    #loading-overlay .progress-bar {
      height: 100%; width: 0%; background: #fff; border-radius: 3px;
      transition: width .3s ease;
    }
    #loading-overlay .progress-pct {
      margin-top: 8px; font-size: 13px; opacity: .7;
    }

  <script>
    function clearAppCache() {
      // Xoá localStorage
      localStorage.clear();
      // Xoá sessionStorage
      sessionStorage.clear();
      // Xoá service worker cache
      if ('caches' in window) {
        caches.keys().then(function(names) {
          for (var n of names) caches.delete(n);
        });
      }
      // Unregister service workers
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          for (var r of regs) r.unregister();
        });
      }
      // Reload bỏ cache
      setTimeout(function() { location.reload(true); }, 300);
    }
  </script>

  <script>
  if ('serviceWorker' in navigator) {

      regs.forEach(function(r) { r.unregister(); });
    });
    if ('caches' in window) {

      });

  <script>
    // Giả lập tiến trình dựa trên thời gian thực tế (~10s)
    (function() {
      var bar = document.getElementById('progress-bar');
      var pct = document.getElementById('progress-pct');
      var progress = 0;
      var done = false;

      // Tăng nhanh đầu, chậm dần cuối (easing)
      var timer = setInterval(function() {
        if (done) return;
        var remaining = 95 - progress;
        var step = Math.max(0.3, remaining * 0.06);
        progress = Math.min(95, progress + step);
        bar.style.width = progress + '%';
        pct.textContent = Math.round(progress) + '%';
      }, 200);

      function dismissOverlay() {
        done = true;
        clearInterval(timer);
        if (bar) bar.style.width = '100%';
        if (pct) pct.textContent = '100%';
        setTimeout(function() {
          var overlay = document.getElementById('loading-overlay');
          var shell = document.getElementById('app-shell');
          if (overlay) { overlay.classList.add('fade-out'); setTimeout(function() { overlay.remove(); }, 400); }
          if (shell) { shell.remove(); }
        }, 300);
      }

      window.addEventListener('flutter-first-frame', dismissOverlay);

      // Tránh xoay vô hạn nếu Flutter lỗi (font, JS, v.v.)
      setTimeout(function() {
        if (done) return;
        clearInterval(timer);
        var overlay = document.getElementById('loading-overlay');
        if (!overlay || overlay.classList.contains('fade-out')) return;
        overlay.innerHTML = '<div style="max-width:360px;text-align:center;padding:24px;color:#fff;font-family:system-ui,sans-serif">' +
          '<p style="font-size:16px;margin:0 0 12px">Không tải được ứng dụng (quá lâu hoặc lỗi script).</p>' +
          '<p style="font-size:13px;opacity:.85;margin:0 0 16px">Thử xóa cache / Ctrl+Shift+R hoặc bấm nút dưới.</p>' +
          '<button type="button" onclick="clearAppCache()" style="padding:12px 20px;border-radius:10px;border:0;background:#fff;color:#1a1a2e;font-weight:600;cursor:pointer">Xóa cache & tải lại</button></div>';
      }, 35000);
    })();
  </script>
