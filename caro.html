<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Cờ Caro</title>
  <style>
    :root {
      --bg: #ffffff;
      --board: #f8fafc;
      --line: #667e98;
      --x-color: #1d4ed8;
      --o-color: #dc2626;
      --panel: #ffffff;
      --text: #102a43;
      --muted: #52606d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: min(1000px, 100%);
      max-width: 980px;
      background: var(--panel);
      border-radius: 28px;
      box-shadow: 0 24px 80px rgba(16, 46, 72, 0.14);
      overflow: hidden;
    }

    header {
      padding: 24px 28px 16px;
      border-bottom: 1px solid rgba(102, 126, 152, 0.14);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 3vw, 3rem);
      line-height: 1.05;
    }

    p {
      margin: 12px 0 0;
      color: var(--muted);
      max-width: 700px;
      line-height: 1.7;
    }

    .status-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin: 18px 28px 0;
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(102, 126, 152, 0.12);
    }

    .status {
      flex: 1;
      min-width: 180px;
      padding: 14px 18px;
      background: #f8fafc;
      border: 1px solid rgba(102, 126, 152, 0.14);
      border-radius: 16px;
      font-weight: 600;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    button {
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 120ms ease, background-color 120ms ease;
    }

    button:hover { background: #1d4ed8; }
    button:active { transform: translateY(1px); }

    .board-wrapper {
      display: grid;
      place-items: center;
      padding: 28px;
      background: var(--panel);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(15, 1fr);
      width: min(720px, 100%);
      aspect-ratio: 1;
      border: 4px solid #9fb8d8;
      border-radius: 20px;
      background: repeating-linear-gradient(0deg, transparent 0, transparent calc(100% / 15 - 1px), rgba(102,126,152,0.3) calc(100% / 15 - 1px), rgba(102,126,152,0.3) calc(100% / 15)),
                  repeating-linear-gradient(90deg, transparent 0, transparent calc(100% / 15 - 1px), rgba(102,126,152,0.3) calc(100% / 15 - 1px), rgba(102,126,152,0.3) calc(100% / 15));
    }

    .cell {
      position: relative;
      width: 100%;
      height: 100%;
      cursor: pointer;
      user-select: none;
      transition: background-color 120ms ease;
      background: transparent;
      border: none;
      outline: none;
      color: inherit;
    }

    .cell:hover {
      background: rgba(37,99,235,0.05);
    }

    .cell.disabled { cursor: default; }

    .mark {
      position: absolute;
      inset: 14px;
      display: grid;
      place-items: center;
      font-size: clamp(1.5rem, 4vw, 3.3rem);
      font-weight: 800;
    }

    .mark.x { color: var(--x-color); }
    .mark.o { color: var(--o-color); }

    .highlight {
      background: rgba(59, 130, 246, 0.12);
      border-radius: 8px;
      box-shadow: inset 0 0 0 2px rgba(37, 99, 235, 0.18);
    }

    .notice {
      margin: 0 28px 24px;
      padding: 16px 18px;
      background: #f1f5f9;
      border: 1px solid rgba(102,126,152,0.15);
      border-radius: 16px;
      color: var(--muted);
      font-size: 0.96rem;
      line-height: 1.7;
    }

    @media (max-width: 720px) {
      .status-bar {
        flex-direction: column;
      }
      header, .notice { padding-left: 18px; padding-right: 18px; }
      .status { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Game Cờ Caro</h1>
      <p>Chọn ô để đánh cờ. Người thắng là người tạo được 5 quân liền nhau theo hàng ngang, dọc hoặc chéo.</p>
    </header>

    <div class="status-bar">
      <div class="status" id="turnStatus">Lượt: X</div>
      <div class="status" id="scoreStatus">Điểm: X 0 • O 0</div>
      <div class="actions">
        <button id="restartBtn">Chơi lại</button>
        <button id="clearBtn">Xoá điểm</button>
      </div>
    </div>

    <div class="board-wrapper">
      <div class="board" id="board"></div>
    </div>

    <div class="notice">
      Sử dụng game này để luyện tập. Nếu bạn muốn chơi tiếp, nhấn nút "Chơi lại". Trò chơi tự động phát hiện thắng / hoà.
    </div>
  </div>

  <script>
    const BOARD_SIZE = 15;
    const WIN_LENGTH = 5;
    const boardEl = document.getElementById('board');
    const turnStatusEl = document.getElementById('turnStatus');
    const scoreStatusEl = document.getElementById('scoreStatus');
    const restartBtn = document.getElementById('restartBtn');
    const clearBtn = document.getElementById('clearBtn');

    let board = [];
    let currentPlayer = 'X';
    let playing = true;
    let score = { X: 0, O: 0 };

    function createBoard() {
      boardEl.innerHTML = '';
      board = Array.from({ length: BOARD_SIZE }, () => Array(BOARD_SIZE).fill(''));
      for (let row = 0; row < BOARD_SIZE; row += 1) {
        for (let col = 0; col < BOARD_SIZE; col += 1) {
          const cell = document.createElement('button');
          cell.type = 'button';
          cell.className = 'cell';
          cell.dataset.row = row;
          cell.dataset.col = col;
          cell.addEventListener('click', handleCellClick);
          boardEl.appendChild(cell);
        }
      }
      playing = true;
      currentPlayer = 'X';
      updateStatus();
    }

    function updateStatus(message) {
      if (message) {
        turnStatusEl.textContent = message;
      } else {
        turnStatusEl.textContent = `Lượt: ${currentPlayer}`;
      }
      scoreStatusEl.textContent = `Điểm: X ${score.X} • O ${score.O}`;
    }

    function handleCellClick(event) {
      if (!playing) return;
      const cell = event.currentTarget;
      const row = Number(cell.dataset.row);
      const col = Number(cell.dataset.col);
      if (board[row][col]) return;

      board[row][col] = currentPlayer;
      renderMark(cell, currentPlayer);

      const winCells = checkWin(row, col, currentPlayer);
      if (winCells) {
        playing = false;
        highlightCells(winCells);
        score[currentPlayer] += 1;
        updateStatus(`Người thắng: ${currentPlayer}`);
        return;
      }

      if (isDraw()) {
        playing = false;
        updateStatus('Hoà!');
        return;
      }

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      updateStatus();
    }

    function renderMark(cell, player) {
      const mark = document.createElement('div');
      mark.className = `mark ${player.toLowerCase()}`;
      mark.textContent = player;
      cell.appendChild(mark);
      cell.classList.add('disabled');
    }

    function isDraw() {
      return board.every(row => row.every(cell => cell));
    }

    function checkWin(row, col, player) {
      const directions = [
        { dr: 0, dc: 1 },
        { dr: 1, dc: 0 },
        { dr: 1, dc: 1 },
        { dr: 1, dc: -1 },
      ];

      for (const { dr, dc } of directions) {
        const line = [{ row, col }];
        line.push(...traceDirection(row, col, dr, dc, player));
        line.push(...traceDirection(row, col, -dr, -dc, player));
        if (line.length >= WIN_LENGTH) {
          return line.slice(0, WIN_LENGTH);
        }
      }
      return null;
    }

    function traceDirection(row, col, dr, dc, player) {
      const cells = [];
      let r = row + dr;
      let c = col + dc;
      while (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && board[r][c] === player) {
        cells.push({ row: r, col: c });
        r += dr;
        c += dc;
      }
      return cells;
    }

    function highlightCells(cells) {
      cells.forEach(({ row, col }) => {
        const index = row * BOARD_SIZE + col;
        boardEl.children[index].classList.add('highlight');
      });
    }

    restartBtn.addEventListener('click', () => {
      createBoard();
    });

    clearBtn.addEventListener('click', () => {
      score = { X: 0, O: 0 };
      createBoard();
      updateStatus();
    });

    createBoard();
  </script>
</body>
</html>
