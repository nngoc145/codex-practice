<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zalo AI Agent Dashboard</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f3f4f6;
      height: 100vh;
      overflow: hidden;
      display: flex;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .pane-right {
      background-color: #f3f4f6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      width: 100vw;
      height: 100vh;
    }
    .qr-container {
      background: white;
      padding: 3rem;
      border-radius: 1.5rem;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      text-align: center;
      max-width: 500px;
      width: 100%;
    }
    .qr-img {
      max-width: 100%;
      height: auto;
      border-radius: 0.5rem;
      margin: 1.5rem 0;
      border: 1px solid #e5e7eb;
      min-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f9fafb;
      position: relative;
    }
    .status-badge {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }
    .status-waiting { background-color: #fef3c7; color: #92400e; }
    .status-active { background-color: #d1fae5; color: #065f46; }
    .status-error { background-color: #fee2e2; color: #991b1b; }
    
    .loading-spinner {
      border: 3px solid #f3f3f3;
      border-radius: 50%;
      border-top: 3px solid #3b82f6;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      position: absolute;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- FULL SCREEN PANE: Zalo QR Code -->
  <div class="pane-right">
    <div class="qr-container">
      <h2 class="text-2xl font-bold text-gray-800 mb-2">Kết nối Zalo AI Bot</h2>
      <p class="text-sm text-gray-500 mb-4">Sử dụng tài khoản Zalo cá nhân của bạn để cấp quyền cho AI tự động trả lời tin nhắn.</p>
      
      <div id="status-indicator" class="status-badge status-waiting">Đang khởi động...</div>
      
      <div class="qr-img" id="qr-box">
        <div class="loading-spinner" id="qr-loader"></div>
        <img id="qr-image" style="display: none; width: 100%; height: 100%;" />
      </div>
      
      <div class="mt-4 text-left p-4 bg-blue-50 rounded-lg text-sm text-blue-800 shadow-inner">
        <p class="font-semibold mb-1">Hướng dẫn:</p>
        <ol class="list-decimal pl-4 space-y-1">
          <li>Mở ứng dụng Zalo trên điện thoại</li>
          <li>Chọn biểu tượng quét mã QR</li>
          <li>Đưa camera quét mã bên trên</li>
          <li>Xác nhận đăng nhập trên điện thoại</li>
        </ol>
      </div>

      <button id="restart-btn" class="mt-6 w-full py-2 bg-gray-800 text-white rounded font-medium hover:bg-gray-700 transition" style="display: none;">
        Tải lại mã QR mới
      </button>
    </div>
  </div>

  <script>
    const qrImage = document.getElementById('qr-image');
    const qrLoader = document.getElementById('qr-loader');
    const statusIdx = document.getElementById('status-indicator');
    const restartBtn = document.getElementById('restart-btn');
    
    let pollingInterval = null;

    function updateStatusUI(statusMsg, type) {
      statusIdx.textContent = statusMsg;
      statusIdx.className = 'status-badge ' + type;
    }

    async function fetchZaloStatus() {
      try {
        const res = await fetch('/api/zalo-status');
        const data = await res.json();
        
        if (data.status === 'starting') {
          updateStatusUI('Đang khởi tạo Zalo...', 'status-waiting');
          qrLoader.style.display = 'block';
          qrImage.style.display = 'none';
        } 
        else if (data.status === 'qr_ready') {
          updateStatusUI('Đang chờ quét QR', 'status-waiting');
          qrLoader.style.display = 'none';
          qrImage.style.display = 'block';
          qrImage.src = 'data:image/png;base64,' + data.qrBase64;
          restartBtn.style.display = 'none';
        }
        else if (data.status === 'active') {
          updateStatusUI('✅ Đang hoạt động', 'status-active');
          qrLoader.style.display = 'none';
          qrImage.style.display = 'none';
          
          if (!document.getElementById('zalo-log-container')) {
            document.getElementById('qr-box').innerHTML = `
              <div style="text-align:left; width:100%; height:100%; display:flex; flex-direction:column; padding: 10px;">
                <div class="text-green-600 font-bold mb-2">Đã xác thực thành công!</div>
                <div id="zalo-log-container" style="flex:1; width:100%; min-height: 200px; max-height: 300px; background: #1e1e1e; color: #10b981; font-family: monospace; font-size: 13px; border-radius: 6px; padding: 10px; overflow-y: auto;">
                  Bắt đầu ghi nhận log...
                </div>
              </div>
            `;
            setInterval(async () => {
              try {
                const logRes = await fetch('/api/zalo-logs');
                const logData = await logRes.json();
                const logDiv = document.getElementById('zalo-log-container');
                if (logDiv && logData.logs) {
                  logDiv.innerHTML = logData.logs.join('<br>') || 'Đang chờ tin nhắn mới...';
                  logDiv.scrollTop = logDiv.scrollHeight;
                }
              } catch(e) {}
            }, 1000);
          }
          clearInterval(pollingInterval);
        }
        else if (data.status === 'error' || data.status === 'declined' || data.status === 'expired') {
          updateStatusUI('Hết hạn / Lỗi', 'status-error');
          qrLoader.style.display = 'none';
          qrImage.style.display = 'none';
          restartBtn.style.display = 'block';
          clearInterval(pollingInterval);
        }
      } catch (err) {
        console.error('Error fetching Zalo status', err);
      }
    }

    async function startZalo() {
      try {
        await fetch('/api/zalo-start', { method: 'POST' });
        // Start polling every 2 seconds
        if(pollingInterval) clearInterval(pollingInterval);
        fetchZaloStatus();
        pollingInterval = setInterval(fetchZaloStatus, 2000);
      } catch (err) {
        console.error('Cannot start Zalo', err);
      }
    }

    restartBtn.addEventListener('click', () => {
      restartBtn.style.display = 'none';
      qrImage.style.display = 'none';
      qrLoader.style.display = 'block';
      document.getElementById('qr-box').innerHTML = '<div class="loading-spinner" id="qr-loader"></div><img id="qr-image" style="display: none; width: 100%; height: 100%;" />';
      startZalo();
    });

    // Initialize
    startZalo();
  </script>
</body>
</html>
